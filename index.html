    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const forced = params.get('lang');
        if (forced === 'en' || forced === 'fi' || forced === 'fr' || forced === 'sv') return;

        const languages = navigator.languages || [navigator.language || ''];
        const preferred = languages
          .map(lang => lang.toLowerCase().slice(0, 2))
          .find(lang => ['fi', 'fr', 'sv'].includes(lang));

        if (preferred && window.location.pathname === '/') {
          window.location.replace('/' + preferred + '/');
        }
      })();
    </script>
